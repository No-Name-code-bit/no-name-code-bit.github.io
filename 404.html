<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 404</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: center;
            padding: 100px 20px;
            background-color: #f8f9fa;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5a6bc4;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <h1>Ошибка 404</h1>
    <p>К сожалению, страница, которую вы ищете, не найдена. Возможно, она была удалена или перемещена.</p>
    <a href="https://no-name-code-bit.github.io/" class="btn">Вернуться на главную</a>
</body>
</html>
